name: Render PlantUML
on:
  push:
    paths:
      - "diagrams/**/*.puml"
      - ".github/workflows/diagrams.yml"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure exports dir
        run: mkdir -p diagrams/exports
      - name: Render diagrams via container
        run: |
          docker run --rm -v "$PWD/diagrams:/work" plantuml/plantuml \
            -tpng -o exports *.puml
          docker run --rm -v "$PWD/diagrams:/work" plantuml/plantuml \
            -tsvg -o exports *.puml
      - name: Commit renders
        run: |
          if [ -n "$(git status --porcelain diagrams/exports)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@users.noreply.github.com"
            git add diagrams/exports
            git commit -m "ci(diagrams): render PlantUML"
            git push
          fi
